<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card">
        <div class="search">
            <input type="text" placeholder="enter city name" spellcheck="false">
            <button><img src="images/211817_search_strong_icon.png"></button>
        </div>
        <div class="error">
            <p>Invalid city name</p>
        </div>
        <div class="weather">
            <img src="images/2682834_cloud_day_forecast_rain_rainy_icon.png" class="weather-icon">
            <h1 class="temp"></h1>
            <h2 class="city">
                </h2class></h2>
            <div class="details">
                <div class="col">
                    <img src="images/2682807_drop_high_humidity_percentage_precipitation_icon.png">
                    <div>
                        <p class="humidity"></p>
                        <p>Humidity</p>
                    </div>
                </div>
                <div class="col">
                    <img src="images/3741354_weather_wind_windy_icon.png">
                    <div>
                        <p class="wind"></p>
                        <p>Wind speed</p>
                    </div>
                </div>
            </div>
        </div>
        <script src="script.js"></script>
</body>

</html>
